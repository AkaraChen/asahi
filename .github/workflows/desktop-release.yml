name: Desktop Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  mac-dmg:
    name: Build macOS DMG
    runs-on: macos-latest
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.8.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set desktop version from tag
        env:
          RELEASE_VERSION: ${{ github.ref_name }}
        run: |
          export VERSION="${RELEASE_VERSION#v}"
          node - <<'NODE'
          const fs = require('node:fs');
          const packagePath = 'apps/desktop/package.json';
          const packageJson = JSON.parse(fs.readFileSync(packagePath, 'utf8'));
          packageJson.version = process.env.VERSION;
          fs.writeFileSync(packagePath, `${JSON.stringify(packageJson, null, 2)}\n`);
          NODE

      - name: Build DMG
        run: pnpm --dir apps/desktop dist:mac

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: asahi-macos-dmg-${{ github.ref_name }}
          path: apps/desktop/out/builder/*.dmg
          if-no-files-found: error

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          dmgs=(apps/desktop/out/builder/*.dmg)
          if [ ${#dmgs[@]} -eq 0 ]; then
            echo "No DMG artifacts were produced" >&2
            exit 1
          fi

          release_args=()
          if [[ "$TAG_NAME" == *-* ]]; then
            release_args+=(--prerelease)
          fi

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            if [[ "$TAG_NAME" == *-* ]]; then
              gh release edit "$TAG_NAME" --prerelease
            fi
          else
            gh release create "$TAG_NAME" \
              --title "$TAG_NAME" \
              --notes "Desktop release $TAG_NAME" \
              "${release_args[@]}"
          fi

          gh release upload "$TAG_NAME" "${dmgs[@]}" --clobber
